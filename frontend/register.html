    <div class="row" style="margin-left:5%; margin-top: 5%;"> 
        <div class="col">

                <label for="pfp">upload image</label><br>
                <input type="image" id="pfp" name="pfp">
            </form>
        </div>

            <form>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email"><br>
                <label for="fname">First name:</label><br>
                <input type="text" id="fname" name="fname"><br>
                <label for="lname">Last name:</label><br>
                <input type="text" id="lname" name="lname"><br>
                <label for="pword">Password:</label><br>
                <input type="password" id="pword" name="pwordc"><br>
                <label for="pwordc">Confirm password:</label><br>
                <input type="password" id="pwordc" name="pwordc"><br>
            </form>
        </div>
        <div class="col">
            <form>
                <p>Strong Subjects</p>
                <input type="checkbox" id="math" name="math" value="math">
                <label for="math"> math</label><br>
                <input type="checkbox" id="science" name="science" value="science">
                <label for="science"> science</label><br>
                <input type="checkbox" id="history" name="history" value="history">
                <label for="history"> history</label><br>
                <input type="checkbox" id="english" name="english" value="english">
                <label for="english"> english</label><br>
                <input type="checkbox" id="french" name="french" value="french">
                <label for="french"> french</label><br>
                <input type="checkbox" id="spanish" name="spanish" value="spanish">
                <label for="spanish"> spanish</label><br>
            </form>
        </div>
        <div class="col">
            <form>
                <p>Subjects to improve on</p>
                <input type="checkbox" id="math" name="math" value="math">
                <label for="math"> math</label><br>
                <input type="checkbox" id="science" name="science" value="science">
                <label for="science"> science</label><br>
                <input type="checkbox" id="history" name="history" value="history">
                <label for="history"> history</label><br>
                <input type="checkbox" id="english" name="english" value="english">
                <label for="english"> english</label><br>
                <input type="checkbox" id="french" name="french" value="french">
                <label for="french"> french</label><br>
                <input type="checkbox" id="spanish" name="spanish" value="spanish">
                <label for="spanish"> spanish</label><br>
            </form>
        </div>
      </div>
        <div class="fixed-bottom float-right">
            <button class="btn btn-lg" type="submit"><img src="./Art Assets/Game Icons/PNG/White/1x/signal3.png"/>submit</button>
